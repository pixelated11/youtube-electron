<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>YouTube</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body, html { height: 100%; overflow: hidden; }
      webview { width: 100%; height: 100vh; }
    </style>
  </head>
  <body>
    <webview
  src="https://www.youtube.com"
  partition="persist:youtube"
  preload="./preload.js"
  allowpopups>
</webview>
  </body>
</html>
